services:
  postgres:
    image: postgres:16-alpine
    container_name: mts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mts
      POSTGRES_PASSWORD: mts
      POSTGRES_DB: mts
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mts"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
